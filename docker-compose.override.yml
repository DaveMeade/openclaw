name: openclaw-local

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw:local

    # run as root
    user: "0:0"

    # sane container hardening limits
    pids_limit: 512
    ulimits:
      nofile: 1048576

    # override upstream bind mounts with named volumes
    volumes:
      - openclaw_data:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    environment:
      OPENCLAW_ALLOWED_ORIGINS: ${OPENCLAW_ALLOWED_ORIGINS}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

    # allow initial startup without config (needed for reset/onboard flow)
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND}",
        "--port",
        "18789",
        "--allow-unconfigured"
      ]

  openclaw-cli:
    #profiles: ["manual"]
    image: openclaw:local

    # root here too for consistency
    user: "0:0"

    volumes:
      - openclaw_data:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

volumes:
  openclaw_data:
  openclaw_workspace:
